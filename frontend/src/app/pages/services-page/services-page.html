<section class="py-5 section-bg">
  <div class="container-xl py-5">
    <div class="d-flex justify-content-between align-items-end mb-5 flex-wrap gap-3">
      <div>
        <h2 class="display-5 fw-bold text-white mb-2">Services & Activités</h2>
        <p class="fs-5 muted">Accompagnement personnalisé pour votre santé du sommeil</p>
      </div>
      <p-button label="Prendre rendez-vous" icon="pi pi-arrow-right" [outlined]="true" severity="secondary" routerLink="/contact"></p-button>
    </div>
    <div class="row g-4">
      <div class="col-md-6 col-lg-4" *ngFor="let s of services">
        <div class="service-card h-100 p-4 rounded-3">
          <div class="icon-wrap d-inline-flex align-items-center justify-content-center rounded-3 mb-4">
            <i [class]="'pi ' + s.icon"></i>
          </div>
          <h3 class="h5 fw-semibold text-white mb-3">{{ s.title }}</h3>
          <p class="small mb-0 card-text">{{ s.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
